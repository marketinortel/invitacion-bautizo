<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación Premium</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;

    background:
    linear-gradient(rgba(0,0,0,.35), rgba(0,0,0,.35)),
    url("fondo.jpg");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    font-family:"Segoe UI",sans-serif;
}

.container{
    width:420px;
    height:720px;
    position:relative;
    perspective:1200px;
}

/* TEXTO */

.start{
    position:absolute;
    top:40px;
    width:100%;
    text-align:center;

    color:#010e46;
    font-family:'Great Vibes',cursive;
    font-size:38px;

    animation:blink 2s infinite;
    transition:.5s;
}

.open .start{
    opacity:0;
}

@keyframes blink{
0%,100%{opacity:1}
50%{opacity:.3}
}

/* PARTÍCULAS */
.particle{
  position:absolute;
  width:6px;
  height:6px;
  background:#8edcff;
  border-radius:50%;
  opacity:0;
}

.open .particle{
  animation:float 2s ease-out forwards;
}

@keyframes float{
  0%{opacity:0; transform:translateY(0)}
  50%{opacity:1}
  100%{opacity:0; transform:translateY(-200px)}
}

/* SOBRE */
.envelope{
  position:absolute;
  bottom:0;
  width:100%;
  height:300px;
  cursor:pointer;
  z-index:10;
  transform-style:preserve-3d;
}

/* BASE DEL SOBRE (IMPORTANTE: OCULTA CARTA) */
.base{
  position:absolute;
  bottom:0;
  width:100%;
  height:300px;

  background:
  linear-gradient(
  145deg,
  #dff7ff 0%,
  #9edcf7 20%,
  #69c4ee 45%,
  #bdeeff 70%,
  #4aa8d8 100%
);

  border-radius:0 0 18px 18px;

  border:1px solid rgba(255,230,180,.3);

  box-shadow:
  0 0 35px rgba(7, 18, 165, 0.25),
  0 20px 40px rgba(0,0,0,.6);

  overflow:hidden;
}

/* TAPA */
.flap{
  position:absolute;
  top:0;
  width:100%;
  height:300px;

  background:
  linear-gradient(
  145deg,
  #c8f0ff,
  #5ebce6
);

  clip-path:polygon(0 0,100% 0,50% 100%);

  transform-origin:top;

  transition:1.2s cubic-bezier(.19,1,.22,1);

  z-index:5;
}

/* SELLO */
.seal{
  position:absolute;
  top:95px;
  left:50%;

  transform:translateX(-50%);

  width:65px;
  height:65px;

  border-radius:50%;

 background:
  radial-gradient(circle,
  #ffffff,
  #69c4ee);

  box-shadow:
  0 0 20px rgba(105,196,238,.8);

  z-index:6;

  transition:.6s;
}

 .card{
    position:absolute;
    left:50%;
    bottom:20px;

    width:380px;
    aspect-ratio:9/16;

    transform:translateX(-50%) translateY(200px);

    border-radius:10px;
    overflow:hidden;

    opacity:0;
    visibility:hidden;

    z-index:2;

    transition:
        transform 1.8s cubic-bezier(.19,1,.22,1),
        box-shadow .6s,
        opacity .8s;
}

.card-image{
    width:100%;
    height:100%;
    display:block;
    object-fit:contain;
}

/* BOTONES FLOTANTES */
.buttons{
    position:absolute;
    left:18px;
    right:18px;
    bottom:20px;

    display:flex;
    flex-direction:column;
    gap:12px;

    z-index:100;
}

.buttons button{
    border:none;
    color:#003366;
    text-shadow:0 1px 3px rgba(0,0,0,.5);
    font-weight:bold;
    font-size:16px;
    padding:12px;
    border-radius:10px;
    box-shadow:0 4px 12px rgba(0,0,0,.3);
}
.wsp{
    background:linear-gradient(
        180deg,
        rgba(67,215,102,.92),
        rgba(22,156,63,.92)
    );
}

.map{
    background:linear-gradient(
        180deg,
        rgba(248,214,123,.92),
        rgba(200,148,47,.92)
    );
}

/* TEXTOS */
.small{
  font-size:16px;
  color:#5a5a5a;
  line-height:1.7;
}
.title{
  font-family:'Cinzel',serif;

  font-size:24px;

  letter-spacing:2px;

  color:#010e46;

  text-transform:uppercase;
	margin-bottom:10px;
}
.name{
  font-family:'Great Vibes',cursive;

  font-size:52px;

  line-height:1;

  color:#010e46;

  margin:18px 0;

  text-shadow:
  0 0 12px rgba(7, 18, 165, 0.25);
}

/* ESTADO ABIERTO */
.open .flap{
  transform:rotateX(180deg);
}

.open .card{
    opacity:1;
    visibility:visible;

    transform:
        translateX(-50%)
        translateY(-170px);

    z-index:30;

    box-shadow:
        0 35px 80px rgba(0,0,0,.55),
        0 0 35px rgba(7, 18, 165, 0.45);
}

.open .seal{
  transform:translateX(-50%) scale(0);
  opacity:0;
}

.effect{
  position:absolute;
  bottom:170px;
  opacity:0;
  pointer-events:none;
  z-index:50;
}

.heart{
  font-size:28px;
}

.petal{
  font-size:22px;
}

.spark{
  width:8px;
  height:8px;
  border-radius:50%;
  background:#8edcff;

  box-shadow:
    0 0 10px #8edcff,
    0 0 20px #8edcff,
    0 0 40px #8edcff;
}

.open .effect{
  animation:burst 3.5s ease-out forwards;
}

@keyframes burst{

  0%{
    opacity:0;
    transform:
      translateY(0)
      translateX(0)
      scale(.2)
      rotate(0deg);
  }

  15%{
    opacity:1;
  }

  100%{
    opacity:0;
    transform:
      translateY(-420px)
      translateX(var(--x))
      scale(1.8)
      rotate(var(--r));
  }
}
.buttons{
    position:absolute;
    left:18px;
    right:18px;
    bottom:25px;

    display:flex;
    flex-direction:column;
    gap:12px;

    opacity:0;

    transform:translateY(30px);

    transition:.8s;
    transition-delay:1.1s;

    z-index:100;
}

.open .buttons{
    opacity:1;
    transform:translateY(0);
}

.buttons button{
    backdrop-filter:blur(15px);
    -webkit-backdrop-filter:blur(15px);

    background:rgba(7, 18, 165, 0.25);

    border:1px solid rgba(255,255,255,.30);

    color:white;

    font-weight:bold;
}
body::before{
    content:"";
    position:fixed;
    inset:0;

    background:url("fondo.jpg") center/cover no-repeat;

    filter:blur(8px);
    transform:scale(1.1);

    z-index:-1;
}
</style>
</head>

<body>

<div class="container" id="box">

<div class="start">
    Están cordialmente invitados al bautizo de nuestro hijo
    <br><br>
    <span style="font-size:28px;">
        Toca el sobre para abrir la invitación
    </span>
</div>

  <!-- partículas -->
  <div class="particle" style="left:20px; top:120px;"></div>
  <div class="particle" style="left:80px; top:90px;"></div>
  <div class="particle" style="left:160px; top:110px;"></div>
  <div class="particle" style="left:240px; top:80px;"></div>
  <div class="particle" style="left:300px; top:120px;"></div>

<!-- CORAZONES -->
<div class="effect heart" style="left:30px; --x:-120px; --r:30deg;">❤️</div>
<div class="effect heart" style="left:90px; --x:90px; --r:-25deg;">💖</div>
<div class="effect heart" style="left:150px; --x:-60px; --r:20deg;">❤️</div>
<div class="effect heart" style="left:230px; --x:120px; --r:-30deg;">💖</div>
<div class="effect heart" style="left:310px; --x:-100px; --r:15deg;">❤️</div>

<!-- PETALOS -->
<div class="effect petal" style="left:60px; --x:-80px; --r:120deg;">🌹</div>
<div class="effect petal" style="left:180px; --x:60px; --r:-150deg;">🌹</div>
<div class="effect petal" style="left:280px; --x:100px; --r:180deg;">🌹</div>

<!-- DESTELLOS -->
<div class="effect spark" style="left:40px; --x:-70px; --r:0deg;"></div>
<div class="effect spark" style="left:100px; --x:90px; --r:0deg;"></div>
<div class="effect spark" style="left:160px; --x:-50px; --r:0deg;"></div>
<div class="effect spark" style="left:220px; --x:110px; --r:0deg;"></div>
<div class="effect spark" style="left:300px; --x:-90px; --r:0deg;"></div>
<div class="effect spark" style="left:360px; --x:70px; --r:0deg;"></div>

<!-- CARTA -->
<div class="card">

    <img src="invitacion.png" class="card-image" alt="Invitación">

    <div class="buttons">
        <button class="wsp" onclick="wa()">Confirmar asistencia</button>
        <button class="map" onclick="map()">Ver ubicación</button>
    </div>

</div>

  <!-- SOBRE -->
  <div class="envelope" onclick="toggle()">
    <div class="flap"></div>
    <div class="seal"></div>
    <div class="base"></div>
  </div>

</div>

<audio id="music" preload="auto" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>

let openState = false;

function toggle(){
  const box = document.getElementById("box");
  const music = document.getElementById("music");

  box.classList.toggle("open");
  openState = !openState;

  if(openState){
    music.play().catch(()=>{});
  }else{
    music.pause();
    music.currentTime = 0;
  }
}

function wa(){
  window.location.href =
  "https://wa.me/593997389730?text=Confirmo%20mi%20asistencia%20al%20bautismo";
}

function map(){
  window.location.href =
  "https://maps.app.goo.gl/knxvGDidiA86rysA8?g_st=aw";
}
window.addEventListener("beforeunload", () => {
    const music = document.getElementById("music");
    music.pause();
    music.currentTime = 0;
});

document.addEventListener("visibilitychange", () => {
    const music = document.getElementById("music");

    if (document.hidden) {
        music.pause();
        music.currentTime = 0;
    }
});
</script>

</body>
</html>
